openapi: 3.1.0
info:
  title: Multiturn RAG Assistant API
  version: 0.1.0
  description: |
    Personalization, multiturn context, and multi-question retrieval workflow API.
servers:
  - url: https://api.example.com
    description: Production
  - url: http://localhost:8080
    description: Local

tags:
  - name: Chat
  - name: Planning
  - name: Retrieval
  - name: Ranking
  - name: Answer
  - name: Memory
  - name: Policy

paths:
  /chat:
    post:
      tags: [Chat]
      summary: End-to-end multiturn chat orchestration
      operationId: chat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: Chat response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'

  /plan:
    post:
      tags: [Planning]
      summary: Split and plan single/compound questions
      operationId: plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlanRequest'
      responses:
        '200':
          description: Plan result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /retrieve:
    post:
      tags: [Retrieval]
      summary: Hybrid retrieval (keyword + vector + metadata filter)
      operationId: retrieve
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetrieveRequest'
      responses:
        '200':
          description: Candidate documents
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetrieveResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /rerank:
    post:
      tags: [Ranking]
      summary: Re-rank candidates using relevance/freshness/trust
      operationId: rerank
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RerankRequest'
      responses:
        '200':
          description: Ranked evidence
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RerankResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /answer:
    post:
      tags: [Answer]
      summary: Generate grounded answer from plan/evidence/context/profile
      operationId: answer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnswerRequest'
      responses:
        '200':
          description: Generated answer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnswerResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'

  /memory/upsert:
    post:
      tags: [Memory]
      summary: Upsert short-term/long-term memory
      operationId: upsertMemory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemoryUpsertRequest'
      responses:
        '200':
          description: Upsert result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryUpsertResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /policy/check:
    post:
      tags: [Policy]
      summary: Validate input/output against safety and privacy policy
      operationId: policyCheck
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyCheckRequest'
      responses:
        '200':
          description: Policy decision
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyCheckResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

components:
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Blocked by policy
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ChatRequest:
      type: object
      required: [session_id, user_id, message]
      properties:
        session_id:
          type: string
        user_id:
          type: string
        message:
          type: string
        locale:
          type: string
          default: ko-KR
        options:
          $ref: '#/components/schemas/ChatOptions'

    ChatOptions:
      type: object
      properties:
        top_k:
          type: integer
          minimum: 1
          maximum: 50
          default: 8
        max_tokens:
          type: integer
          minimum: 128
          maximum: 8192
          default: 1200
        include_citations:
          type: boolean
          default: true
        enable_memory_write:
          type: boolean
          default: true

    ChatResponse:
      type: object
      required: [answer, policy]
      properties:
        answer:
          type: string
        citations:
          type: array
          items:
            $ref: '#/components/schemas/Citation'
        followups:
          type: array
          items:
            type: string
        policy:
          $ref: '#/components/schemas/PolicyDecision'
        debug:
          $ref: '#/components/schemas/DebugTrace'

    PlanRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
        context:
          $ref: '#/components/schemas/SessionContext'
        profile:
          $ref: '#/components/schemas/UserProfile'

    PlanResponse:
      type: object
      required: [questions, dag, retrieval_required]
      properties:
        questions:
          type: array
          items:
            $ref: '#/components/schemas/QuestionUnit'
        dag:
          type: array
          items:
            $ref: '#/components/schemas/DagEdge'
        retrieval_required:
          type: boolean
        strategy:
          type: string
          enum: [single, compound_parallel, compound_sequential, mixed]

    RetrieveRequest:
      type: object
      required: [queries]
      properties:
        queries:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/RetrieveQuery'
        filters:
          $ref: '#/components/schemas/RetrieveFilter'
        top_k:
          type: integer
          minimum: 1
          maximum: 100
          default: 20

    RetrieveResponse:
      type: object
      required: [candidates]
      properties:
        candidates:
          type: array
          items:
            $ref: '#/components/schemas/DocumentCandidate'

    RerankRequest:
      type: object
      required: [candidates]
      properties:
        context:
          $ref: '#/components/schemas/SessionContext'
        candidates:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/DocumentCandidate'
        top_k:
          type: integer
          minimum: 1
          maximum: 50
          default: 8

    RerankResponse:
      type: object
      required: [evidence]
      properties:
        evidence:
          type: array
          items:
            $ref: '#/components/schemas/Evidence'

    AnswerRequest:
      type: object
      required: [plan, context]
      properties:
        plan:
          $ref: '#/components/schemas/PlanResponse'
        evidence:
          type: array
          items:
            $ref: '#/components/schemas/Evidence'
        context:
          $ref: '#/components/schemas/SessionContext'
        profile:
          $ref: '#/components/schemas/UserProfile'
        options:
          $ref: '#/components/schemas/AnswerOptions'

    AnswerResponse:
      type: object
      required: [answer]
      properties:
        answer:
          type: string
        citations:
          type: array
          items:
            $ref: '#/components/schemas/Citation'
        per_question_answers:
          type: array
          items:
            $ref: '#/components/schemas/PerQuestionAnswer'

    MemoryUpsertRequest:
      type: object
      required: [user_id, session_id, memories]
      properties:
        user_id:
          type: string
        session_id:
          type: string
        memories:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/MemoryItem'
        policy:
          $ref: '#/components/schemas/MemoryPolicy'

    MemoryUpsertResponse:
      type: object
      properties:
        saved:
          type: integer
        skipped:
          type: integer
        reason_codes:
          type: array
          items:
            type: string

    PolicyCheckRequest:
      type: object
      required: [phase, content]
      properties:
        phase:
          type: string
          enum: [input, output]
        content:
          type: string
        metadata:
          type: object
          additionalProperties: true

    PolicyCheckResponse:
      type: object
      required: [decision]
      properties:
        decision:
          $ref: '#/components/schemas/PolicyDecision'
        fixes:
          type: array
          items:
            type: string

    SessionContext:
      type: object
      properties:
        recent_turns:
          type: array
          items:
            $ref: '#/components/schemas/Turn'
        summary:
          type: string

    Turn:
      type: object
      required: [role, text]
      properties:
        role:
          type: string
          enum: [user, assistant, system]
        text:
          type: string
        created_at:
          type: string
          format: date-time

    UserProfile:
      type: object
      properties:
        tone:
          type: string
          enum: [concise, balanced, detailed]
        domain_level:
          type: string
          enum: [beginner, intermediate, advanced]
        forbidden_topics:
          type: array
          items:
            type: string
        preferred_format:
          type: string
          enum: [paragraph, bullet, table]
        language:
          type: string
          default: ko

    QuestionUnit:
      type: object
      required: [id, text]
      properties:
        id:
          type: string
        text:
          type: string
        depends_on:
          type: array
          items:
            type: string

    DagEdge:
      type: object
      required: [from, to]
      properties:
        from:
          type: string
        to:
          type: string

    RetrieveQuery:
      type: object
      required: [text]
      properties:
        text:
          type: string
        rewritten_text:
          type: string
        time_range:
          $ref: '#/components/schemas/TimeRange'
        metadata:
          type: object
          additionalProperties: true

    TimeRange:
      type: object
      properties:
        from:
          type: string
          format: date
        to:
          type: string
          format: date

    RetrieveFilter:
      type: object
      properties:
        source_types:
          type: array
          items:
            type: string
            enum: [web, docs, db, ticket]
        domains:
          type: array
          items:
            type: string
        language:
          type: string

    DocumentCandidate:
      type: object
      required: [doc_id, chunk_id, text, score]
      properties:
        doc_id:
          type: string
        chunk_id:
          type: string
        title:
          type: string
        url:
          type: string
          format: uri
        text:
          type: string
        score:
          type: number
        metadata:
          type: object
          additionalProperties: true

    Evidence:
      type: object
      required: [doc_id, chunk_id, text, rank]
      properties:
        doc_id:
          type: string
        chunk_id:
          type: string
        text:
          type: string
        rank:
          type: integer
        relevance:
          type: number
        freshness:
          type: number
        trust:
          type: number

    Citation:
      type: object
      required: [doc_id]
      properties:
        doc_id:
          type: string
        chunk_id:
          type: string
        title:
          type: string
        url:
          type: string
          format: uri

    AnswerOptions:
      type: object
      properties:
        style:
          type: string
          enum: [default, concise, detailed]
        max_tokens:
          type: integer
          minimum: 64
          maximum: 8192
        include_followups:
          type: boolean
          default: true

    PerQuestionAnswer:
      type: object
      required: [question_id, answer]
      properties:
        question_id:
          type: string
        answer:
          type: string

    MemoryItem:
      type: object
      required: [type, key, value]
      properties:
        type:
          type: string
          enum: [long_term, short_term]
        key:
          type: string
        value:
          type: string
        ttl_seconds:
          type: integer
          minimum: 1
        pii:
          type: boolean
          default: false
        confidence:
          type: number
          minimum: 0
          maximum: 1

    MemoryPolicy:
      type: object
      properties:
        allow_pii:
          type: boolean
          default: false
        min_confidence:
          type: number
          minimum: 0
          maximum: 1
          default: 0.7

    PolicyDecision:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pass, warn, block]
        reason_codes:
          type: array
          items:
            type: string

    DebugTrace:
      type: object
      properties:
        trace_id:
          type: string
        latency_ms:
          type: integer
        strategy:
          type: string
        retrieval_used:
          type: boolean

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
